<div class="characters-page page-container">
  <div class="page-header" style="border-bottom: 2px solid var(--accent-primary); margin-bottom: 30px; padding-bottom: 10px;">
    <h1 style="margin: 0;">RECRUTAMENTO DE AGENTES</h1>
    <p style="font-family: var(--font-mono); color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase;">Acesso restrito // Ordo Realitas // Nível 1</p>
  </div>

  <div class="creator-container">
    <!-- Sidebar: Identity & Setup -->
    <div class="creator-sidebar surface-glass">
      <h3 class="section-title" style="color: var(--accent-primary); border-bottom: 1px solid var(--accent-primary-dim); margin-bottom: 15px;">Dossiê do Agente</h3>
      
      <div class="form-group">
        <label style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-secondary);">NOME OPERACIONAL</label>
        <input type="text" class="field-input w-100" [(ngModel)]="currentCharacter.name" placeholder="Insira o nome do agente...">
      </div>

      <div class="form-group" style="margin-top: 15px;">
        <label style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-secondary);">SISTEMA DE ANÁLISE</label>
        <select class="field-input w-100" [(ngModel)]="selectedSchemaId" (change)="onSystemChange()">
          <option *ngFor="let schema of availableSchemas" [value]="schema.id">{{ schema.name }}</option>
        </select>
      </div>

      <div class="form-group" style="margin-top: 15px;">
        <label style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-secondary);">UPLOAD DE RETRATO</label>
        <div class="image-upload-box">
          <input type="file" id="portrait-upload" accept="image/*" (change)="onImageUpload($event)" hidden>
          <label for="portrait-upload" class="btn btn-secondary w-100" style="display: block; font-size: 0.8rem; text-align: center;">Vincular Arquivo</label>
        </div>
      </div>
      
      <div class="character-preview" *ngIf="currentCharacter.portraitUrl" style="margin-top: 15px; border: 1px solid var(--accent-primary-dim); padding: 5px;">
        <div class="preview-img" [style.backgroundImage]="'url(' + currentCharacter.portraitUrl + ')'" style="height: 150px; background-size: cover; background-position: center; filter: grayscale(1) contrast(1.2);"></div>
      </div>
      
      <div class="actions" style="margin-top: 25px; display: flex; flex-direction: column; gap: 10px;">
        <button class="btn w-100" style="font-size: 0.9rem;" (click)="saveCurrentAgent()" [disabled]="isSaving">
          {{ isSaving ? 'SINCRONIZANDO...' : 'Finalizar Dossiê' }}
        </button>
        <button class="btn btn-secondary w-100" style="font-size: 0.8rem;" (click)="onDiscard()">
          Descartar Alterações
        </button>
      </div>

      <div class="terminal-footer" style="margin-top: 30px; font-family: var(--font-mono); font-size: 0.6rem; color: var(--accent-secondary); opacity: 0.6;">
        > SYNCING WITH ORDO_MAIN...<br>
        > ENCRYPTION: ACTIVE<br>
        > NO RECORDS FOUND.
      </div>
    </div>

    <!-- Main Editor: The Dynamic Sheet -->
    <div class="creator-main">
       <app-dynamic-sheet [schema]="activeSchema" 
                          [data]="currentCharacter"
                          (dataChanged)="onDataChanged($event)"></app-dynamic-sheet>
    </div>
  </div>
</div>
